name: Flutter CI Pipeline

# TRIGGER: pipeline otomatis jalan saat ada push atau pull request ke branch main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── JOB 1: CI — Cek, Analisis, dan Test ───
  flutter-ci:
    name: CI - Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout kode dari repo
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: "stable"

      - name: 📦 Install dependencies (flutter pub get)
        run: flutter pub get

      - name: 🔍 Analyze kode (cek error & warning)
        run: flutter analyze

      - name: 🧪 Jalankan semua unit test
        run: flutter test --coverage

      - name: ✅ CI selesai - semua aman!
        run: echo "CI passed! Kode aman, siap untuk di-deploy."
