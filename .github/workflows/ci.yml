name: Flutter CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── TAHAP 1: Install dependencies ──
  get_dependencies:
    name: Get Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
      - name: Install packages
        run: flutter pub get

  # ── TAHAP 2a: Cek kualitas kode (CI) ──
  code_quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: get_dependencies
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
      - run: flutter pub get
      - name: Analyze kode
        run: flutter analyze lib/calculator.dart

  # ── TAHAP 2b: Jalankan unit test (CI) ──
  unit_test:
    name: Unit Test
    runs-on: ubuntu-latest
    needs: get_dependencies
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
      - run: flutter pub get
      - name: Run tests
        run: flutter test test/widget_test.dart

  # ── TAHAP 3: Build APK (CD) ──
  build_apk:
    name: Build APK
    runs-on: ubuntu-latest
    needs: [ code_quality, unit_test ]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
      - run: flutter pub get
      - name: Build APK
        run: flutter build apk --release --no-shrink
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk